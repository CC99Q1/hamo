<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="https://i.top4top.io/p_3691du0f31.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ܩߺܒߺܩߺߺݏࡉ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            position: relative;
            background: #000;
            touch-action: pan-y pinch-zoom;
            overflow-x: hidden;
        }

        /* خلفية الفيديو مع أنميشن */
        #background-media {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            animation: backgroundZoom 20s ease-in-out infinite alternate;
        }

        @keyframes backgroundZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* طبقة التغميق مع أنميشن */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
            animation: overlayPulse 8s ease-in-out infinite alternate;
        }

        @keyframes overlayPulse {
            0% { background: rgba(0, 0, 0, 0.4); }
            100% { background: rgba(0, 0, 0, 0.6); }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* البطاقة - أنميشن دخول قوي */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 25px 20px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
            border: 3px solid white;
            animation: cardFloatIn 1s cubic-bezier(0.23, 1, 0.32, 1) forwards, cardGlow 3s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes cardFloatIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(50px) rotate(-2deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) rotate(0);
            }
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5); }
            100% { box-shadow: 0 40px 70px rgba(196, 155, 31, 0.4); }
        }

        /* الميديا بوكس مع أنميشن */
        .media-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #f0f0f0;
            border-radius: 35px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid white;
            cursor: pointer;
            animation: mediaSlideIn 1.2s ease-out 0.3s forwards, mediaPulse 4s ease-in-out 1s infinite;
            opacity: 0;
            transform: translateX(-30px);
        }

        @keyframes mediaSlideIn {
            0% {
                opacity: 0;
                transform: translateX(-30px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes mediaPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .media-box img,
        .media-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s;
            animation: mediaZoom 15s ease-in-out infinite alternate;
        }

        @keyframes mediaZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .media-box:hover img,
        .media-box:hover video {
            transform: scale(1.05);
        }

        /* النص السفلي */
        .bottom-text {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* الجملة الرئيسية - سطر واحد مع أنميشن شامل */
        .main-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a1a1a;
            line-height: 1.4;
            display: block;
            font-family: 'Arial', 'Helvetica', sans-serif;
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 10px;
            margin-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            animation: textReveal 2s ease-out forwards, textShimmer 3s ease-in-out 2s infinite, textWave 5s ease-in-out infinite;
            transform-origin: right;
        }

        @keyframes textReveal {
            0% {
                opacity: 0;
                transform: translateX(50px) skewX(10deg);
                letter-spacing: 10px;
            }
            100% {
                opacity: 1;
                transform: translateX(0) skewX(0);
                letter-spacing: 0.5px;
            }
        }

        @keyframes textShimmer {
            0% { text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
            50% { text-shadow: 4px 4px 8px rgba(196, 155, 31, 0.4); }
            100% { text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        }

        @keyframes textWave {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-2px); }
        }

        /* تنسيق اليدل مع أنميشن */
        .handle-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #c49b1f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            direction: ltr;
            margin-top: 12px;
            letter-spacing: 0.5px;
            animation: handleRotateIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.8s forwards, handleColorShift 4s ease-in-out infinite;
            opacity: 0;
            transform: scale(0) rotate(-180deg);
        }

        @keyframes handleRotateIn {
            0% {
                opacity: 0;
                transform: scale(0) rotate(-180deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        @keyframes handleColorShift {
            0%, 100% { color: #c49b1f; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
            50% { color: #e6b422; text-shadow: 0 0 10px #e6b422, 2px 2px 4px rgba(0,0,0,0.2); }
        }

        .handle-text a {
            color: inherit;
            text-decoration: none;
            position: relative;
            display: inline-block;
            animation: linkBounce 3s ease-in-out infinite;
        }

        @keyframes linkBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .handle-text a::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e6b422, transparent);
            animation: lineFlow 2s linear infinite;
        }

        @keyframes lineFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* أيقونات التواصل - أنميشن متكامل */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        .telegram-icon {
            width: 55px;
            height: 55px;
            background: #0088cc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            animation: iconPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.2s forwards, iconDance 5s ease-in-out 1.8s infinite, iconGlow 2s ease-in-out infinite alternate;
            opacity: 0;
            transform: translateY(50px);
        }

        .instagram-icon {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 110%, #ffd600, #ff7a00, #d3008a, #9300c4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            animation: iconPopIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.4s forwards, iconDance 5s ease-in-out 2s infinite, iconGlow 2s ease-in-out 0.5s infinite alternate;
            opacity: 0;
            transform: translateY(50px);
        }

        @keyframes iconPopIn {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes iconDance {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.1); }
        }

        @keyframes iconGlow {
            0% { box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
            100% { box-shadow: 0 8px 20px rgba(196, 155, 31, 0.6); }
        }

        .telegram-icon:hover,
        .instagram-icon:hover {
            animation: none;
            transform: scale(1.2) rotate(360deg);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .telegram-icon svg,
        .instagram-icon svg {
            width: 30px;
            height: 30px;
            fill: white;
            animation: iconSpin 10s linear infinite;
        }

        @keyframes iconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .telegram-icon:hover svg,
        .instagram-icon:hover svg {
            animation: none;
        }

        /* Modal مع أنميشن */
        .media-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: modalFadeIn 0.5s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                backdrop-filter: blur(0);
            }
            to {
                opacity: 1;
                backdrop-filter: blur(10px);
            }
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            animation: modalZoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalZoomIn {
            from {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .modal-content img,
        .modal-content video {
            max-width: 100%;
            max-height: 90vh;
            border: 3px solid white;
            border-radius: 20px;
            animation: modalContentPulse 2s ease-in-out infinite alternate;
        }

        @keyframes modalContentPulse {
            from { border-color: white; }
            to { border-color: #c49b1f; }
        }

        /* تحسين للشاشات الصغيرة */
        @media (max-width: 480px) {
            .main-text {
                font-size: 1.4rem;
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 1;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .handle-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- طبقة التغميق -->

                    <!-- انستغرام -->
                    <a href="https://instagram.com/v.vri" target="_blank" class="instagram-icon">

            </div>
        </div>

    <!-- Modal -->
    <div class="media-modal" id="mediaModal" onclick="this.style.display='none'">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // روابط الوسائط
        const backgroundUrl = 'https://l.top4top.io/m_3728houra1.mp4';
        const thumbnailUrl = 'https://g.top4top.io/m_3728hddaq1.mp4';
        const fullMediaUrl = 'https://g.top4top.io/m_3728hddaq1.mp4';
        
        function setBackground(url) {
            const container = document.getElementById('background-container');
            container.innerHTML = '';
            const isVideo = url.match(/\.(mp4|webm|ogg|mov|avi)$/i) || url.includes('video');
            
            if (isVideo) {
                const video = document.createElement('video');
                video.id = 'background-media';
                video.src = url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.zIndex = '-1';
                container.appendChild(video);
            } else {
                document.body.style.background = `url('${url}') no-repeat center center / cover`;
                document.body.style.backgroundAttachment = 'fixed';
            }
        }

        function setThumbnail(url) {
            const box = document.getElementById('thumbnailBox');
            box.innerHTML = '';
            const isVideo = url.match(/\.(mp4|webm|ogg|mov|avi)$/i) || url.includes('video');
            
            if (isVideo) {
                const video = document.createElement('video');
                video.src = url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                box.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = url;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                box.appendChild(img);
            }
        }

        document.getElementById('thumbnailBox').addEventListener('click', function() {
            const modal = document.getElementById('mediaModal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = '';
            
            const isVideo = fullMediaUrl.match(/\.(mp4|webm|ogg|mov|avi)$/i) || fullMediaUrl.includes('video');
            
            if (isVideo) {
                const video = document.createElement('video');
                video.src = fullMediaUrl;
                video.controls = true;
                video.autoplay = true;
                video.style.maxWidth = '100%';
                video.style.maxHeight = '90vh';
                modalContent.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = fullMediaUrl;
                img.style.maxWidth = '100%';
                img.style.maxHeight = '90vh';
                modalContent.appendChild(img);
            }
            modal.style.display = 'flex';
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('mediaModal').style.display = 'none';
            }
        });

        window.onload = function() {
            setBackground(backgroundUrl);
            setThumbnail(thumbnailUrl);
            
            // إضافة كلاس إضافي للأنميشن
            document.body.classList.add('animations-loaded');
        };
    </script>
</body>
